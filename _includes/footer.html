<footer>
    <div class="text-center text-black-50" style="padding:1rem">
        <div>&copy; {{ site.time | date: '%Y' }} {{ site.owner.name }} · Powered by Jekyll · Theme by Morecho</div>
    </div>
    <script src="https://cdn.staticfile.net/jquery/3.7.1/jquery.slim.min.js"></script>
    <script src="https://cdn.staticfile.net/popper.js/2.11.8/umd/popper.min.js"></script>
    <script src="https://cdn.staticfile.net/bootstrap/5.3.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.staticfile.net/feather-icons/4.29.1/feather.min.js"></script>
    <script src="https://v1.hitokoto.cn/?encode=js&select=%23hitokoto" defer></script>
    <script src="https://cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js" defer></script>
    <script src="https://cdn.staticfile.net/highlight.js/11.10.0/highlight.min.js"></script>
    <script src="https://cdn.staticfile.net/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"></script>
    <script src="https://cdn.staticfile.net/smooth-scroll/16.1.3/smooth-scroll.min.js"></script>
    <script src="https://cdn.staticfile.net/clipboard.js/2.0.11/clipboard.min.js"></script>
    <script src="https://cdn.staticfile.net/tocbot/4.32.2/tocbot.min.js"></script>
    <script src="https://cdn.staticfile.net/plyr/3.7.8/plyr.min.js"></script>
    <script src="https://cdn.staticfile.net/simple-jekyll-search/1.9.2/simple-jekyll-search.min.js"></script>
    <script src="https://cdnjs.webstatic.cn/ajax/libs/autolinker/3.15.0/Autolinker.min.js" integrity="sha512-I3G6EZwC5S8QDBRI8UYriGE7RGmvbOFgA407DnC/pKTF72kcN+AhdBnB7kc9o1hdJ3pFccd+z4lpfYkFV9nx2Q==" crossorigin="anonymous"></script>
    <script defer>
      hljs.highlightAll();
      hljs.initLineNumbersOnLoad();
    </script>
    <script> feather.replace()</script>

    {% if page.layout == 'post' %}
    <script>
        tocbot.init({
            tocSelector: '.js-toc',
            contentSelector: '.js-toc-content',
            headingSelector: 'h1, h2, h3, h4',
            hasInnerContainers: true,
            scrollEndCallback: function(){
                var padding = 5;
                $('.js-toc-move').css('top', $('.is-active-li a').offset().top - $('.js-toc').offset().top - padding)
                $('.js-toc-move').css('height', $('.is-active-li a').height() + padding*2)
            }
        });
    </script>
    {% endif %}

    {% if page.url == '/archive/' %}
    <script src="{{ site.baseurl }}/asserts/js/archive.js"></script>
    <script>
        $(function () {
            $.fn.tagcloud.defaults = {
                color: { start: '#95C7E0', end: '#3CC4C5' },
            };
            $('#tag_cloud a').tagcloud();
        })
    </script>
    {% endif %}

    <script src="{{ site.baseurl }}/script.js'"></script>
    <script>
        const player = new Plyr('#player', { controls: '' });
        $('.music-controls .play').click(function () {
            player.play();
            $('.music-controls').removeClass('paused');
            $('.music-controls .loading').css('display', 'unset');
        })
        $('.music-controls .pause').click(function () {
            player.pause();
            $('.music-controls').addClass('paused');
        })
        $('.music-controls .progress').click(function (e) {
            var progress = (e.clientX - $(this).offset().left) / $(this).width();
            player.currentTime = parseInt(progress * player.duration);
            $('.music-controls .play').click();
        })
        player.on('ended', function () {
            $('.music-controls').addClass('paused');
        });
        player.on('timeupdate', function () {
            $('.music-controls .loading').css('display', 'none');
            if (player.duration == 0)
                var progress = 0;
            else
                var progress = parseInt(player.currentTime * 100 / player.duration);
            $('.music-controls .progress-bar:first-child').css('width', progress + '%')
            restbuffered = parseInt(player.buffered * 100) - progress
            $('.music-controls .progress-bar:last-child').css('width', restbuffered + '%')
            setTimeout(function (progress) {
                if (progress + '%' === $('.music-controls .progress-bar:first-child').css('width'))
                    $('.music-controls .loading').css('display', 'unset');
                else
                    $('.music-controls .loading').css('display', 'none');
            }, 2000)
        })
    </script>
</footer>
