<!DOCTYPE html>
<html class="loading">

<head>
    <meta charset="utf-8" />
    <meta name="renderer" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>
        {% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{
        site.title }}{% endif %}
    </title>
    <meta name="description" content="{{ site.description }}" />
    <meta name="keywords" content="{{ site.keyword }}" />
    <link rel="shortcut icon" href="{{ site.favicon }}">
    <link rel="stylesheet" href="{{ '/style.css' | prepend: site.baseurl }}">
    <link rel="stylesheet" href="https://cdn.staticfile.net/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.staticfile.net/highlight.js/11.10.0/styles/vs2015.min.css">
    <link rel="stylesheet" href="https://cdn.coolcdn.cn/static/font-awesome/7.0.0/css/all.min.css">
</head>

<body class="theme-front-none">
    <div class="sidebar">
        <div class="card card-sidebar-control">
            <i data-control="open" data-feather="menu"></i>
            <i data-control="close" data-feather="arrow-left"></i>
        </div>
        <div class="container">
            <div class="row row-nav">
                <div class="col-12">
                    {% include nav.html %}
                    {% include sidebar.html %}
                </div>
            </div>
        </div>
    </div>
    <div class="content">
        <div class="container">
            <div class="row">
                <div class="col-10 col-md-4 col-lg-3"></div>
                <div class="col-12 col-md-8 col-lg-6 col-content js-toc-content">
                    <div class="card card-fullscreen-control">
                        <i data-control="on" data-feather="maximize-2"></i>
                        <i data-control="off" data-feather="minimize-2"></i>
                    </div>
                    {{ content }}

                    {% include footer.html %}
                </div>
                <div class="col-9 col-md-4 col-lg-3"></div>
            </div>
        </div>
    </div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(() => {
    document.documentElement.classList.remove('loading');
  }, 150);
});
</script>
</body>

</html>
